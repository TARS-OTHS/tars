name: caveman
description: Toggle caveman (terse) communication style — off, lite, full, ultra
prompt: Run the caveman tool with level "{level}". Report the result.
tools:
  - caveman
parameters:
  - name: level
    type: string
    description: "Caveman level: off, lite, full, or ultra"
    required: true
    choices:
      - "off"
      - "lite"
      - "full"
      - "ultra"
