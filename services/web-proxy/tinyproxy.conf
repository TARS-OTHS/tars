# TARS Web Proxy Configuration
# Outbound HTTP/HTTPS proxy for sandboxed agent containers

Port 8899
Listen 0.0.0.0
Timeout 600
MaxClients 100

# Allow connections from Docker networks
Allow 172.17.0.0/16
Allow 10.0.0.0/8
Allow 192.168.0.0/16

# Logging
LogLevel Warning

# No upstream proxy by default (override in .env if needed)
# Upstream http proxy.example.com:8080

# Allow CONNECT for HTTPS
ConnectPort 443
ConnectPort 563
