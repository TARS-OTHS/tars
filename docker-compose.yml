services:
  auth-proxy:
    build:
      context: ./services/auth-proxy
      network: host
    env_file: .env
    environment:
      - OPENCLAW_DIR=/root/.openclaw
    ports:
      - "${DOCKER_HOST_IP:-172.17.0.1}:${AUTH_PROXY_PORT:-9100}:9100"
    volumes:
      - ${TARS_HOME:-.}/.secrets-vault:${TARS_HOME:-.}/.secrets-vault:ro
      - ${TARS_HOME:-.}/.config/age:${TARS_HOME:-.}/.config/age:ro
      - ${TARS_HOME:-.}/.secrets:${TARS_HOME:-.}/.secrets:ro
      - auth-proxy-logs:${TARS_HOME:-.}/logs
      - /root/.openclaw:/root/.openclaw
    depends_on:
      memory-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/ops/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - tars

  memory-api:
    build:
      context: ./services/memory-api
      network: host
    env_file: .env
    environment:
      - EMBEDDING_SERVICE_URL=http://embedding-service:8896
      - BIND_HOST=0.0.0.0
      - DB_PATH=/app/data/memory.db
      - SECRETS_DIR=/app/secrets
      - OPS_ALERTS_URL=${OPS_ALERTS_URL:-}
    ports:
      - "${DOCKER_HOST_IP:-172.17.0.1}:${MEMORY_API_PORT:-8897}:8897"
    volumes:
      - memory-data:/app/data
      - ${TARS_HOME:-.}/.secrets:/app/secrets:ro
    depends_on:
      embedding-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8897/status', r => { let d=''; r.on('data',c=>d+=c); r.on('end',()=>process.exit(r.statusCode===200?0:1)) }).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - tars

  embedding-service:
    build:
      context: ./services/embedding-service
      network: host
    env_file: .env
    environment:
      - MODEL_DIR=/app/models/bge-small-en-v1.5
      - BIND_HOST=0.0.0.0
    ports:
      - "${DOCKER_HOST_IP:-172.17.0.1}:${EMBEDDING_PORT:-8896}:8896"
    volumes:
      - embedding-models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8896/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - tars

  dashboard:
    build:
      context: ./services/dashboard
      network: host
    env_file: .env
    environment:
      - MEMORY_API_URL=http://memory-api:8897
      - BIND_HOST=0.0.0.0
    ports:
      - "${DASHBOARD_BIND:-127.0.0.1}:${DASHBOARD_PORT:-8765}:8765"
      - "${DASHBOARD_BIND:-127.0.0.1}:${DASHBOARD_API_PORT:-8766}:8766"
    depends_on:
      memory-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8766/')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - tars

  web-proxy:
    build:
      context: ./services/web-proxy
      network: host
    env_file: .env
    ports:
      - "${DOCKER_HOST_IP:-172.17.0.1}:${WEB_PROXY_PORT:-8899}:8899"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q --spider http://localhost:8899/ || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - tars

  credential-proxy:
    build:
      context: ./services/credential-proxy
      network: host
    env_file: .env
    environment:
      - PROXY_LOG_PATH=/app/logs/proxy.log
      - BIND_HOST=0.0.0.0
    volumes:
      - credential-proxy-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8899', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - tars

  cron:
    build:
      context: ./services/cron
      network: host
    env_file: .env
    environment:
      - MEMORY_API_URL=http://memory-api:8897
      - EMBEDDING_SERVICE_URL=http://embedding-service:8896
      - MEMORY_DB_PATH=/app/data/memory.db
      - MEMORY_BACKUP_DIR=/app/data/backups
      - SECRETS_DIR=/app/secrets
      - OPENCLAW_DIR=/oc-config
      - OC_AUTH_PROFILES=/oc-config/agents/main/agent/auth-profiles.json
      - OPS_ALERTS_CHANNEL=${OPS_ALERTS_CHANNEL:-}
    volumes:
      - memory-data:/app/data
      - cron-logs:/var/log
      - ${TARS_HOME:-.}/.secrets:/app/secrets
      - ${HOME}/.openclaw:/oc-config:ro
    depends_on:
      memory-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tars

  # --- MCP Gateway (MetaMCP) ---
  mcp-gateway:
    image: ghcr.io/metatool-ai/metamcp:latest
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://metamcp:metamcp@mcp-db:5432/metamcp
      - POSTGRES_HOST=mcp-db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=metamcp
      - POSTGRES_PASSWORD=metamcp
      - POSTGRES_DB=metamcp
      - BETTER_AUTH_SECRET=${MCP_AUTH_SECRET:-changeme-generate-a-real-secret}
      - APP_URL=http://localhost:${MCP_GATEWAY_PORT:-12008}
      - NODE_ENV=production
      - LOG_LEVEL=errors-only
    ports:
      - "${DOCKER_HOST_IP:-172.17.0.1}:${MCP_GATEWAY_PORT:-12008}:12008"
    volumes:
      - ${HOME}/.config/google-mcp:/home/nextjs/.config/google-mcp:ro
      - ${HOME}/.local/share/google-mcp:/home/nextjs/.local/share/google-mcp
    depends_on:
      mcp-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q --spider http://localhost:12008/ || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - tars

  mcp-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=metamcp
      - POSTGRES_PASSWORD=metamcp
      - POSTGRES_DB=metamcp
    volumes:
      - mcp-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metamcp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tars

volumes:
  auth-proxy-logs:
  memory-data:
  embedding-models:
  credential-proxy-logs:
  cron-logs:
  mcp-db-data:

networks:
  tars:
    driver: bridge
